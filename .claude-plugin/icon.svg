<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect fill="url(#bg-gradient)" width="256" height="256" rx="48"/>

  <!-- QA 主文案 (y从140调整到130，为下方留出空间) -->
  <text x="128" y="140" font-size="90" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">QA</text>

  <!-- Test Case Skill 副文案 (居中，字号20) -->
  <text x="128" y="200" font-size="20" font-weight="600" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Arial, sans-serif" letter-spacing="1">TestCase Workflow</text>

  <!-- 右上角 Badge -->
  <rect x="170" y="20" width="66" height="24" rx="12" fill="rgba(255,255,255,0.9)"/>
  <text x="203" y="36" font-size="14" font-weight="bold" text-anchor="middle" fill="#357ABD" font-family="Arial, sans-serif">v0.1</text>
</svg>