# CodeBuddy Plugin Configuration
# QA 测试用例工作流插件

name: qa-testcase-workflow
version: 0.1.0
display_name: "QA 测试用例工作流"
description: "测试工程师测试用例管理的完整工作流自动化，支持 PRD 分析、变更分析、用例生成、评审和归档"

# 作者信息
author:
  name: zengzhihua
  email: 1036181341@qq.com
  url: https://github.com/run-noob

# 许可证
license: MIT

# 仓库信息
repository:
  type: git
  url: https://github.com/run-noob/qa-testcase-workflow.git

homepage: https://github.com/run-noob/qa-testcase-workflow
bugs: https://github.com/run-noob/qa-testcase-workflow/issues

# 插件类型
type: workflow

# 主入口技能
main_skill: qa-workflow

# 所有技能列表
skills:
  - name: qa-workflow
    path: skills/qa-workflow
    description: "工作流总控，自动编排执行完整的5步测试用例管理流程"
    primary: true
    version: 0.1.0
    commands:
      - /qa-workflow
    aliases:
      - workflow
      - qa

  - name: qa-prd-analysis
    path: skills/qa-prd-analysis
    description: "分析PRD文档，输出结构化需求分析报告、功能点、测试关注点与风险项"
    version: 0.1.0
    commands:
      - /qa-prd-analysis
    aliases:
      - prd
      - analysis

  - name: qa-change-diff
    path: skills/qa-change-diff
    description: "分析需求变更对存量用例的影响，生成变更差异报告"
    version: 0.1.0
    commands:
      - /qa-change-diff
    aliases:
      - diff
      - change

  - name: qa-testcase-generation
    path: skills/qa-testcase-generation
    description: "基于分析结果自动生成结构化测试用例"
    version: 0.1.0
    commands:
      - /qa-testcase-generation
    aliases:
      - gen
      - generate

  - name: qa-testcase-review
    path: skills/qa-testcase-review
    description: "自动评审用例质量，识别问题并生成评审报告"
    version: 0.1.0
    commands:
      - /qa-testcase-review
    aliases:
      - review

  - name: qa-testcase-merge
    path: skills/qa-testcase-merge
    description: "将新用例合并到全量库，归档当前需求文档"
    version: 0.1.0
    commands:
      - /qa-testcase-merge
    aliases:
      - merge

# 依赖项
dependencies:
  # 运行时依赖
  runtime:
    min_codebuddy_version: "2.0.0"
    platforms:
      - win32
      - darwin
      - linux

  # 必需的目录结构
  directories:
    - path: prd/current
      required: true
      auto_create: true
      description: "当前需求PRD文档目录"

    - path: prd/current/images
      required: true
      auto_create: true
      description: "PRD引用的图片目录"

    - path: prd/current/output
      required: true
      auto_create: true
      description: "工作流产物输出目录"

    - path: prd/current/output/test-cases
      required: true
      auto_create: true
      description: "测试用例产物目录"

    - path: prd/archive
      required: true
      auto_create: true
      description: "归档需求目录"

    - path: test-cases
      required: true
      auto_create: true
      description: "全量测试用例库"

    - path: glossary
      required: false
      auto_create: true
      description: "业务术语表（强烈推荐）"

    - path: standards
      required: false
      auto_create: true
      description: "测试规范文档（推荐）"

  # 必需的文件
  files:
    - path: test-cases/index.md
      required: true
      auto_create: true
      template: templates/test-cases-index.md
      description: "测试用例库索引文件"

# 功能特性
features:
  - "一键执行完整的5步测试用例管理流程"
  - "支持部分执行（--steps）、断点恢复（--resume）"
  - "智能目录结构验证和自动创建"
  - "实时进度可视化和状态追踪"
  - "自动PRD分析和功能点提取"
  - "存量用例变更影响分析"
  - "基于模板的结构化用例生成"
  - "自动化用例质量评审"
  - "安全的用例合并和归档机制"
  - "支持retry/skip/abort错误恢复策略"

# 标签
tags:
  - testing
  - qa
  - automation
  - workflow
  - test-management
  - productivity
  - prd-analysis
  - test-case-generation
  - quality-assurance

# 关键词
keywords:
  - qa
  - testing
  - test-case
  - test-management
  - workflow
  - automation
  - prd-analysis
  - 测试用例
  - 测试管理
  - 自动化
  - 工作流

# 语言支持
languages:
  - zh-CN
  - en

# 文档
docs:
  readme: README.md
  guide: CLAUDE.md
  changelog: CHANGELOG.md
  license: LICENSE

# 图标和截图
assets:
  icon: .codebuddy-plugin/icon.png
  screenshots:
    - path: screenshots/workflow-progress.png
      caption: "工作流执行进度可视化"
    - path: screenshots/error-handling.png
      caption: "智能错误处理和恢复"
    - path: screenshots/directory-validation.png
      caption: "目录结构验证和自动创建"

# 配置项
config:
  # 默认行为
  defaults:
    auto_cleanup_state: true
    show_progress: true
    verbose_logging: false

  # 可配置选项
  options:
    - name: default_mode
      type: string
      default: auto
      enum: [auto, interactive]
      description: "默认执行模式：auto（自动）或 interactive（交互式）"

    - name: enable_auto_create_dirs
      type: boolean
      default: true
      description: "是否自动创建缺失的目录"

    - name: review_strictness
      type: string
      default: normal
      enum: [strict, normal, lenient]
      description: "用例评审的严格程度"

    - name: merge_conflict_resolution
      type: string
      default: auto_renumber
      enum: [auto_renumber, manual, abort]
      description: "用例ID冲突时的处理策略"

# 钩子（可选）
hooks:
  pre_workflow:
    script: .codebuddy-plugin/hooks/pre-workflow.sh
    description: "工作流执行前的检查"

  post_workflow:
    script: .codebuddy-plugin/hooks/post-workflow.sh
    description: "工作流执行后的操作（如自动提交）"

  on_error:
    script: .codebuddy-plugin/hooks/on-error.sh
    description: "错误发生时的处理"

# 权限要求
permissions:
  - filesystem:read
  - filesystem:write
  - filesystem:create
  - filesystem:delete  # 仅用于归档和清理

# 测试
tests:
  - name: "完整流程测试"
    command: test/integration/full-workflow.test.sh
  - name: "部分执行测试"
    command: test/integration/partial-execution.test.sh
  - name: "断点恢复测试"
    command: test/integration/resume.test.sh

# 发布信息
publish:
  category: Testing & Quality Assurance
  visibility: public
  marketplace_url: https://marketplace.codebuddy.ai/plugins/qa-testcase-workflow
  support_url: https://github.com/run-noob/qa-testcase-workflow/issues
  documentation_url: https://github.com/run-noob/qa-testcase-workflow/blob/main/CLAUDE.md
